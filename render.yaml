# Blueprint de deploy no Render (https://render.com).
# New + → Blueprint → conecte este repositório. O Render lê este arquivo e sobe
# o serviço, gerando uma URL pública fixa para o fluxo n8n consumir.
#
# Sobre FFmpeg: não há apt-get aqui. O pacote imageio-ffmpeg (requirements.txt)
# embute um binário estático, então o runtime Python nativo do Render basta.
#
# Sobre o plano gratuito: o serviço hiberna após alguns minutos sem uso e leva
# cerca de 50 segundos para acordar. O fluxo n8n consulta o estado do job a
# cada 15 segundos, e esse tráfego contínuo impede a hibernação no meio de uma
# execução — o cold start afeta apenas a primeira chamada do dia.
services:
  - type: web
    name: radar-tendencia-gocase
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"

      # --- Credenciais ---
      # sync: false = o valor NÃO fica neste arquivo nem no Git. É definido no
      # painel do Render, em Environment.

      # Zernio: transporte de publicação no TikTok. Obrigatória.
      - key: ZERNIO_API_KEY
        sync: false
      # Opcional: sem ela, o sistema descobre a conta via GET /accounts.
      - key: ZERNIO_TIKTOK_ACCOUNT_ID
        sync: false
      # Anthropic: conceito de arte, legenda e hashtags. Obrigatória.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Google AI Studio: imagem e vídeo. Opcional — sem ela o pipeline usa a
      # geração local (Pillow + FFmpeg) e informa isso no relatório.
      - key: GOOGLE_API_KEY
        sync: false

      # --- Operação ---
      # true  = envia para o Creator Inbox da TikTok — atravessa a integração
      #         inteira sem nada ficar público.
      # false = publica direto no perfil.
      # O padrão seguro é o inbox: publicar exige uma mudança explícita.
      - key: MODO_RASCUNHO
        value: "true"
