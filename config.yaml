# Radar de Tendência — configuração de negócio
#
# Tudo que um time de marketing ajustaria sem abrir Python vive aqui.
# Ausência ou erro neste arquivo não derruba a execução: src/config.py
# cai para os padrões embutidos e avisa.

marca:
  nome: GoCase
  # Voz da marca. Entra no prompt do redator e limita o que a IA pode escrever.
  voz: >-
    Direta, jovem e brasileira. Fala de produto, não de sentimento genérico.
    Sem superlativo vazio, sem "revolucionário", sem "eleve seu estilo".
  # Paleta de demonstração. Não são as cores oficiais da GoCase — são um
  # conjunto coerente para o business case. Trocar aqui repinta todo o material.
  paleta:
    primaria: "#FF5A1F"
    secundaria: "#1A1A2E"
    destaque: "#FFD166"
    fundo: "#F7F7F9"
  # Logotipo exibido em fade no fim do vídeo. Caminho relativo à raiz do
  # projeto. Ausente ou inválido: o vídeo é montado sem ele e o relatório
  # registra — assinatura de marca não deve derrubar uma publicação.
  logo: marca/gocase.png

  # Proibições duras. Verificadas por código depois da geração, não só pedidas
  # no prompt — modelo de linguagem não é mecanismo de garantia.
  proibido:
    - promessa de prazo de entrega
    - preço ou desconto
    - comparação direta com concorrente
    - superlativo sem lastro
    - menção a saúde, política ou religião

# Catálogo de produtos. Espelha o "Google Sheets trigger" do vídeo de
# referência: a automação lê uma fonte de dados de produto, não inventa SKU.
# `area_arte` é a área de impressão real do produto, em pixels. Capinha de
# celular é alta (~1:2) — gerar arte quadrada e recortar o centro descarta
# metade do desenho e corta a composição pela metade.
produtos:
  - sku: CASE-IPH-15P
    nome: Capinha iPhone 15 Pro
    linha: Impact Pro
    area_arte: [1024, 2048]
  - sku: CASE-SAM-S24
    nome: Capinha Galaxy S24
    linha: Impact Pro
    area_arte: [1024, 2048]
  - sku: CASE-IPH-14
    nome: Capinha iPhone 14
    linha: Slim
    area_arte: [1024, 2048]

# Sinais de tendência. Cada execução escolhe um e o marca como usado, para que
# execuções seguidas não gerem conteúdo idêntico — o Zernio rejeita conteúdo
# duplicado na mesma conta dentro de 24h com HTTP 409.
sinais:
  # CRITÉRIO DE ENTRADA — o filtro que faltava e custou uma rodada inteira:
  #
  #   1. É uma tendência de CULTURA JOVEM: internet, moda, música, jogo, praia,
  #      festa. Ladrilho hidráulico, terrazzo e art déco entraram numa versão
  #      anterior por serem estéticas específicas e saíram por serem do domínio
  #      errado — são tendências de arquitetura e decoração. Ninguém compra
  #      capinha porque gostou de um piso.
  #   2. O público cabe na faixa de quem compra capinha, de 16 a 32. Se a
  #      descrição do público começa a falar em "casa", "escritório" ou
  #      "arquitetura", o sinal está errado.
  #   3. Alguém CARREGARIA isso no bolso o dia inteiro. É roupa, não parede.
  #
  # Cada sinal carrega três campos, e os três entram no briefing da arte:
  #   tema     — o assunto, específico. "Estética retrô" é vago demais para
  #              render desenho definido; "Y2K cromado" tem forma e cor próprias.
  #   publico  — para quem, o que muda o tom do texto.
  #   estetica — a linguagem visual, em termos que um ilustrador executaria.
  #
  # A lista é longa de propósito: com cinco sinais e três produtos, a quarta
  # execução do dia repetia combinação, e conteúdo repetido é recusado pela
  # plataforma dentro de 24 horas.

  - id: y2k-cromado
    tema: "Y2K cromado e bolha metálica"
    publico: "16-24, moda e internet"
    estetica: >-
      Superfícies cromadas com reflexo em gradiente radial, bolhas líquidas
      fundindo-se, brilho especular, estrelas de quatro pontas, halo azulado.
      Prateado sobre fundo profundo.

  - id: coquette-laco
    tema: "laços e cetim da estética coquette"
    publico: "16-24, moda"
    estetica: >-
      Laços de fita repetidos em escalas variadas, cetim com brilho suave em
      gradiente, pérolas pequenas espalhadas, rendas em linha fina, rosa
      empoeirado e creme com detalhe cereja.

  - id: gamer-neon
    tema: "cultura gamer e circuito neon"
    publico: "16-28, gamer"
    estetica: >-
      Traço neon brilhante sobre fundo quase preto, halo difuso ao redor das
      linhas, trilhas de circuito em ângulo reto, partículas de luz subindo,
      ciano e magenta em contraste duro.

  - id: vaporwave
    tema: "vaporwave e horizonte em grade"
    publico: "18-28, música e internet"
    estetica: >-
      Grade em perspectiva sumindo no horizonte, sol listrado grande, montanhas
      geométricas, névoa em gradiente, magenta e ciano sobre roxo profundo,
      estrelas finas espalhadas.

  - id: memphis-80
    tema: "revival Memphis dos anos 80"
    publico: "18-24, universitário"
    estetica: >-
      Formas geométricas primárias flutuando sem gravidade, ziguezagues,
      confete de triângulos e círculos, traços grossos, malha de pontos ao
      fundo. Contraste alto entre poucas cores saturadas.

  - id: traco-manga
    tema: "traço de mangá e ação em velocidade"
    publico: "16-26, anime e cultura pop"
    estetica: >-
      Preto e branco dominando o quadro, com UMA única cor de destaque usada com
      parcimônia. Cinza feito só por retícula de meio-tom, com pontos que mudam
      de tamanho para simular gradação. Linhas de velocidade finas e paralelas
      correndo em diagonal, afinando nas pontas. Traço de pincel com espessura
      variável, grosso no começo e fino no fim. Composição em diagonal forte,
      nunca centralizada. Nada de estrelas de impacto, explosões amarelas ou
      raios coloridos — isso é quadrinho americano, não mangá.

  - id: grafite-urbano
    tema: "grafite e spray de rua"
    publico: "17-28, streetwear"
    estetica: >-
      Fitas largas entrelaçadas terminando em ponta de seta, no espírito do
      wildstyle, desenhadas como formas fechadas — nunca como texto. Cada fita
      leva contorno preto bem grosso, preenchimento chapado e um risco branco de
      brilho no canto superior. Tinta escorrendo em gotas alongadas a partir das
      bordas de baixo. Respingos finos de spray espalhados e halo difuso ao
      redor das formas. Muro de concreto cinza ao fundo, com manchas e emendas.
      O contorno preto é obrigatório: sem ele vira mancha colorida, não grafite.

  - id: verao-tropical
    tema: "verão tropical e fruta gelada"
    publico: "16-28, praia e verão"
    estetica: >-
      Frutas cortadas em corte transversal, folhagem de monstera em silhueta
      sobreposta, gotas de água em brilho especular, luz forte de meio-dia,
      cores saturadas e quentes com verde profundo.

  - id: surf-vintage
    tema: "surf vintage e litoral"
    publico: "18-30, praia e esporte"
    estetica: >-
      Ondas em faixas concêntricas, sol poente em degradê horizontal, palmeiras
      em silhueta, granulado sutil, laranja queimado e turquesa desbotado,
      clima de cartaz antigo.

  - id: carnaval-grafico
    tema: "carnaval em linguagem gráfica contemporânea"
    publico: "18-30, festa e música"
    estetica: >-
      Confete e serpentina em fitas curvas, silhuetas de plumas estilizadas,
      ritmo diagonal, cores quentes vibrantes sobrepostas com transparência,
      brilho pontual disperso.

  - id: psicodelia-70
    tema: "psicodelia dos anos 70"
    publico: "18-30, música e festival"
    estetica: >-
      Ondulações concêntricas que deformam o quadro, flores estilizadas de
      pétalas grossas, degradê de laranja para roxo, formas líquidas
      derretendo, simetria radial.

  - id: constelacoes
    tema: "mapa estelar e constelações"
    publico: "18-30, noturno e introspectivo"
    estetica: >-
      Pontos de estrela de tamanhos variados ligados por linhas finas, círculos
      concêntricos de carta celeste, névoa em gradiente radial, azul profundo
      com dourado pálido.

  - id: botanico-linha
    tema: "botânica em traço fino"
    publico: "18-30, minimalista"
    estetica: >-
      Folhas e ramos desenhados só com linha fina contínua, composição
      assimétrica que sobe pela lateral, poucos preenchimentos chapados,
      verde-sálvia e terroso sobre fundo claro.

  - id: risograph
    tema: "impressão risograph e sobreposição de tintas"
    publico: "18-26, arte e faculdade"
    estetica: >-
      Duas ou três tintas chapadas sobrepostas com leve desalinho, áreas de
      mistura onde as tintas cruzam, textura de meio-tom em pontos grandes,
      papel levemente creme aparecendo nas bordas.

# Radar de tendências reais. Lê o que o Brasil está pesquisando agora no feed
# público do Google Trends e submete cada busca a uma triagem.
#
# A triagem RECUSA muito mais do que aprova, e isso é o comportamento correto.
# Numa leitura real, as dez altas do momento eram: 8 de janeiro, Deltan
# Dallagnol, Banco Master, tribunal de contas, liga dos campeões, Fenerbahçe,
# MG-188, Bianca Andrade, balanço da copa e climatização. Política, processo,
# notícia financeira, clube de futebol, nome de pessoa e provável acidente
# rodoviário — nenhum vira estampa, e vários violam as proibições da marca.
#
# Quando nada passa, o catálogo curado acima assume. O relatório da execução
# registra a origem do tema e a lista de recusas com o motivo de cada uma.
radar:
  usar_tendencias_reais: true
  regiao: BR

video:
  largura: 1080
  altura: 1920
  fps: 30
  duracao_segundos: 8      # TikTok exige entre 3s e 10min
  codec: libx264
  # Usado quando a geração de vídeo por IA não está disponível.
  fallback_zoom: 1.18      # fator do Ken Burns no fallback FFmpeg

publicacao:
  # Compliance TikTok. Estes valores não são opinião — são exigência.
  privacidade_desejada: PUBLIC_TO_EVERYONE
  permitir_comentario: true
  permitir_duet: true
  permitir_stitch: true
  # Conteúdo é gerado por IA: divulgação obrigatória pela política da TikTok.
  feito_com_ia: true
  # A GoCase promove o próprio negócio, não parceria paga de terceiro.
  tipo_conteudo_comercial: brand_organic
  # Polling do status de publicação. A janela precisa cobrir o pior caso da
  # TikTok, não o típico: o Creator Inbox costuma confirmar na primeira
  # consulta, mas uma recusa pode levar vários minutos para aparecer — e sem
  # cobrir isso o relatório diz "indeterminado" em vez do motivo real.
  tentativas_status: 30
  intervalo_status_segundos: 8

ia:
  # Interruptores de custo. A geração de imagem e a de vídeo têm preços muito
  # diferentes — vídeo custa cerca de 30 vezes mais por execução — então cada
  # uma tem seu próprio controle. Desligada, a etapa usa o caminho local, que
  # é código de produção e não simulação.
  usar_ia_imagem: true
  usar_ia_video: false

  modelo_texto: claude-opus-4-8
  # Imagen é descontinuado em 17/08/2026. Usamos a linha Nano Banana, que é a
  # migração recomendada pela própria Google.
  modelo_imagem: gemini-3.1-flash-image
  # Variante "fast": mesma família, custo menor. Trocar por
  # veo-3.1-generate-preview se a fidelidade do movimento não bastar.
  modelo_video: veo-3.1-fast-generate-preview
  # A saída é um JSON curto. Teto deliberadamente baixo para conter custo —
  # se a geração truncar, o pipeline avisa em vez de publicar texto cortado.
  max_tokens: 2000
